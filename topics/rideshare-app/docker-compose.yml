version: '3.9'

services:
  # ─── Infrastructure ────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: rideshare
      POSTGRES_PASSWORD: rideshare
      POSTGRES_DB: rideshare
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rideshare']
      interval: 5s
      timeout: 3s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Backend Services ──────────────────────────────────────────────
  location-service:
    build:
      context: ./services/location-service
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  matching-service:
    build:
      context: ./services/matching-service
      dockerfile: Dockerfile
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      POSTGRES_URL: postgresql://rideshare:rideshare@postgres:5432/rideshare
      TRIP_SERVICE_URL: http://trip-service:3004
      NOTIFICATION_SERVICE_URL: http://notification-service:3005
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  pricing-service:
    build:
      context: ./services/pricing-service
      dockerfile: Dockerfile
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  trip-service:
    build:
      context: ./services/trip-service
      dockerfile: Dockerfile
    ports:
      - '3004:3004'
    environment:
      PORT: 3004
      POSTGRES_URL: postgresql://rideshare:rideshare@postgres:5432/rideshare
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    ports:
      - '3005:3005'
    environment:
      PORT: 3005
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontends ─────────────────────────────────────────────────────
  rider-app:
    build:
      context: ./frontend/rider-app
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - matching-service
      - trip-service

  driver-app:
    build:
      context: ./frontend/driver-app
      dockerfile: Dockerfile
    ports:
      - '5174:80'
    depends_on:
      - location-service
      - matching-service

volumes:
  redis-data:
  postgres-data:
  zookeeper-data:
